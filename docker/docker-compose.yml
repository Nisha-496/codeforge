services:
  postgres:
    image: postgres:16-alpine
    container_name: codeforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: codeforge
      POSTGRES_PASSWORD: codeforge_dev_password
      POSTGRES_DB: codeforge
    ports:
      - "5432:5432"
    volumes:
      - codeforge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeforge -d codeforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: codeforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - codeforge_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  codeforge_postgres_data:
  codeforge_redis_data:
